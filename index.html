<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title id="metaTitle">YT SEO Power Suite - AI Metadata</title>
    <meta id="metaDesc" name="description" content="Generate high-converting YouTube metadata.">
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800;900&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; background-color: #080808; color: #ffffff; }
        .yt-red-gradient { background: linear-gradient(135deg, #ff0000 0%, #990000 100%); }
        .card-bg { background-color: #121212; border: 1px solid #1f1f1f; }
        .line-clamp-title { display: -webkit-box; -webkit-line-clamp: 3; -webkit-box-orient: vertical; overflow: hidden; }
    </style>
</head>
<body class="flex flex-col min-h-screen overflow-x-hidden">

    <nav class="flex justify-between items-center px-8 py-6 max-w-7xl mx-auto w-full border-b border-white/5">
        <div class="text-xl font-bold tracking-tighter cursor-pointer" onclick="window.location.href='/'">YT<span class="text-red-600">METADATA</span></div>
    </nav>

    <section class="text-center py-16 px-4">
        <h1 id="dynamicHeroTitle" class="text-4xl md:text-7xl font-black mb-6 tracking-tight leading-[0.9] uppercase">
            Inject <span class="text-red-600">Power</span> into your<br>Metadata
        </h1>
        
        <div class="max-w-2xl mx-auto relative group">
            <form onsubmit="event.preventDefault(); handleManualGenerate();" class="relative flex flex-col md:flex-row gap-2 bg-[#121212] p-2 rounded-2xl border border-white/10 shadow-2xl">
                <input type="text" id="topicInput" placeholder="Enter video topic..." 
                    class="flex-1 bg-transparent px-6 py-4 outline-none text-white text-xl font-bold placeholder:text-gray-700">
                <button type="submit" class="yt-red-gradient px-12 py-5 rounded-xl text-xs font-black tracking-[0.2em] hover:scale-[1.02] transition">
                    GENERATE
                </button>
            </form>
        </div>
    </section>

    <main class="max-w-7xl mx-auto px-6 py-10 w-full">
        <div id="resultsGrid" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-8"></div>
    </main>

    <script>
        const titleTemplates = [(t) => `Secret: ${t} That Nobody Tells You`, (t) => `Effective Strategy for ${t} 2026`, (t) => `How to ${t} Fast: A Complete Guide` ];
        const heroTemplates = [(t) => `Master <span class="text-red-600">${t}</span> Like a Pro`, (t) => `Rank #1 for <span class="text-red-600">${t}</span>` ];

        // FUNGSI UTAMA: Ambil dari URL
        window.onload = () => {
            const path = window.location.pathname.replace(/^\/|\/$/g, '');
            if (path && path !== 'index.html' && path !== '404.html') {
                const keyword = path.replace(/-/g, ' ');
                document.getElementById('topicInput').value = keyword;
                generateMetadata(keyword, false);
            }
        };

        function handleManualGenerate() {
            const topic = document.getElementById('topicInput').value.trim();
            if (!topic) return;
            const slug = topic.toLowerCase().replace(/[^a-z0-9 ]/g, '').replace(/\s+/g, '-');
            // Ubah URL tanpa reload
            window.history.pushState({}, '', `/${slug}`);
            generateMetadata(topic, true);
        }

        function generateMetadata(topic, scroll) {
            const grid = document.getElementById('resultsGrid');
            grid.innerHTML = `<div class="col-span-full text-center py-20 text-gray-600 font-black tracking-widest animate-pulse">GENERATING FOR: ${topic.toUpperCase()}</div>`;

            setTimeout(() => {
                grid.innerHTML = "";
                // Hero Title 10/10 Independen
                const heroGen = heroTemplates[Math.floor(Math.random() * heroTemplates.length)];
                document.getElementById('dynamicHeroTitle').innerHTML = heroGen(topic);
                document.title = `${topic.toUpperCase()} - SEO Metadata`;

                for (let i = 0; i < 6; i++) {
                    const score = i === 0 ? 10 : 9;
                    const title = titleTemplates[i % titleTemplates.length](topic);
                    grid.innerHTML += `
                        <div class="card-bg p-8 rounded-[2rem] flex flex-col gap-6 ${score === 10 ? 'ring-2 ring-red-600/40' : ''}">
                            <div class="flex justify-between items-center">
                                <span class="text-[9px] font-black text-gray-700 tracking-widest uppercase">RESULT #${i+1}</span>
                                <span class="text-green-500 border border-green-500/20 bg-black/50 px-3 py-1 rounded-full text-[10px] font-black">SCORE ${score}/10</span>
                            </div>
                            <h2 class="text-xl font-bold leading-tight line-clamp-title">${title}</h2>
                            <button onclick="alert('Copied!')" class="w-full py-4 bg-red-600 text-[10px] font-black rounded-xl uppercase tracking-widest">Copy Metadata</button>
                        </div>`;
                }
                if(scroll) grid.scrollIntoView({ behavior: 'smooth' });
            }, 500);
        }
    </script>
</body>
</html>
